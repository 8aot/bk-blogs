    <script>
        // 1. 音乐：首次点击触发自动播放
        window.addEventListener('click', () => {
            const a = document.getElementById('bgm');
            if (a && a.paused) a.play().catch(() => {});
        }, { once: true });

        // 2. 樱花飘落
        !function(){
            var c = document.createElement("canvas");
            c.style.cssText = "position:fixed;top:0;left:0;pointer-events:none;z-index:9999997";
            document.body.appendChild(c);
            var ctx = c.getContext("2d"), w = innerWidth, h = innerHeight;
            c.width = w; c.height = h;
            addEventListener("resize", function(){ w=innerWidth; h=innerHeight; c.width=w; c.height=h; });
            var p = [];
            for(var i=0;i<40;i++) p.push({
                x:Math.random()*w, y:Math.random()*h,
                vx:Math.random()*.5+.5, vy:Math.random()*1+1,
                angle:Math.random()*Math.PI*2,
                spin:Math.random()*.05-.025, size:Math.random()*4+5
            });
            (function render(){
                ctx.clearRect(0,0,w,h);
                p.forEach(function(t){
                    ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.angle);
                    ctx.beginPath();
                    ctx.moveTo(0,-t.size);
                    ctx.bezierCurveTo(t.size,-t.size,t.size,t.size,0,t.size);
                    ctx.bezierCurveTo(-t.size,t.size,-t.size,-t.size,0,-t.size);
                    ctx.fillStyle="rgba(255,183,197,0.75)"; ctx.fill(); ctx.restore();
                    t.x+=t.vx; t.y+=t.vy; t.angle+=t.spin;
                    if(t.y>h||t.x>w){ t.y=-20; t.x=Math.random()*w; }
                });
                requestAnimationFrame(render);
            })();
        }();

        // 3. 鼠标星光拖尾
        !function(){
            var c = document.createElement("canvas");
            c.style.cssText = "position:fixed;top:0;left:0;pointer-events:none;z-index:9999998";
            document.body.appendChild(c);
            var ctx = c.getContext("2d"), w = innerWidth, h = innerHeight;
            c.width = w; c.height = h;
            addEventListener("resize", function(){ w=innerWidth; h=innerHeight; c.width=w; c.height=h; });
            var pts = [];
            addEventListener("mousemove", function(e){
                pts.push({
                    x:e.clientX, y:e.clientY,
                    vx:Math.random()*2-1, vy:Math.random()*2-1,
                    size:Math.random()*3+1.5,
                    color:"hsl("+(Math.random()*360)+",100%,75%)"
                });
            });
            (function render(){
                ctx.clearRect(0,0,w,h);
                pts.forEach(function(p){
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
                    ctx.fillStyle=p.color; ctx.fill();
                    p.x+=p.vx; p.y+=p.vy; p.size*=.92;
                });
                pts = pts.filter(function(p){ return p.size>.5; });
                requestAnimationFrame(render);
            })();
        }();

        // 4. 点击爱心上浮
        !function(e,t){
            var d=[], rAF=e.requestAnimationFrame||function(f){setTimeout(f,16)};
            (function loop(){
                for(var i=d.length-1;i>=0;i--){
                    var o=d[i];
                    if(o.alpha<=0){ t.body.removeChild(o.el); d.splice(i,1); continue; }
                    o.y--; o.scale+=.004; o.alpha-=.013;
                    o.el.style.cssText="left:"+o.x+"px;top:"+o.y+"px;opacity:"+o.alpha
                        +";transform:scale("+o.scale+","+o.scale+") rotate(45deg)"
                        +";background:"+o.color+";z-index:9999999"
                        +";width:10px;height:10px;position:fixed;pointer-events:none;";
                }
                rAF(loop);
            })();
            var orig = typeof e.onclick==="function" && e.onclick;
            e.onclick = function(ev){
                if(orig) orig(ev);
                var el=t.createElement("div"); el.className="heart";
                var color="rgb("+~~(255*Math.random())+","+~~(255*Math.random())+","+~~(255*Math.random())+")";
                d.push({el:el, x:ev.clientX-5, y:ev.clientY-5, scale:1, alpha:1, color:color});
                t.body.appendChild(el);
            };
        }(window,document);
    </script>

    <!-- ══════════════════════════════════════════
         博客主逻辑
    ══════════════════════════════════════════ -->
    <script>
        let R2_DOMAIN = "";
        let currentFilterSeries   = "";
        let currentFilterCategory = "";
        let currentSearchQuery    = "";
        let activeCategories  = [];
        let activeSeriesList  = [];
        let dbNavMeta         = {};
        let currentPageNum    = 1;
        let globalLayoutMode  = "standard";
        let globalPopularLimit = 5;

        // ── marked 配置 ──────────────────────────────────────────────────
        // 注意：marked 通过 defer 加载，DOMContentLoaded 后才可用
        function initMarked() {
            if (typeof marked === 'undefined') return;
            marked.setOptions({
                highlight: (code, lang) => {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                },
                langPrefix: 'hljs language-'
            });
        }

        // ── fetch 超时封装（默认 8s）──────────────────────────────────────
        async function fetchWithTimeout(url, options = {}, ms = 8000) {
            const ctrl  = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), ms);
            try {
                const res = await fetch(url, { ...options, signal: ctrl.signal });
                clearTimeout(timer);
                return res;
            } catch (e) {
                clearTimeout(timer);
                throw e;
            }
        }

        // ── 路由 ─────────────────────────────────────────────────────────
        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('load', async () => {
            initMarked();
            // config 与 navMeta 并行加载，加快首屏速度
            await Promise.allSettled([loadSiteConfig(), fetchNavMeta()]);
            handleRouting();
        });

        function handleRouting() {
            const hash = window.location.hash;
            if (hash.startsWith('#/post/')) {
                loadPost(hash.replace('#/post/', ''));
            } else if (hash.startsWith('#/series/')) {
                showSeriesView(decodeURIComponent(hash.replace('#/series/', '')));
            } else {
                showHomeView();
            }
        }

        // ── 加载站点配置 ──────────────────────────────────────────────────
        async function loadSiteConfig() {
            try {
                const res = await fetchWithTimeout('./api/config?_t=' + Date.now());
                if (!res.ok) throw new Error('config error');
                const data = await res.json();

                const title    = data.site_title    || "dh.at8.ccwu.cc";
                const subtitle = data.site_subtitle || "无服务器数字花园";
                activeCategories   = JSON.parse(data.site_categories  || '["技术","教程","随笔","思考"]');
                activeSeriesList   = JSON.parse(data.site_series       || '["科学上网","谷歌系列","NAS系列"]');
                const rawNavLinks  = JSON.parse(data.site_nav_links    || '[]');
                globalLayoutMode   = data.site_layout_mode   || "standard";
                globalPopularLimit = parseInt(data.site_popular_limit) || 5;
                R2_DOMAIN          = data.site_r2_domain     || "";

                document.title = title;
                document.getElementById('nav-site-title').innerText = title;

                // 隐藏骨架，显示真实标题
                document.getElementById('site-title-skeleton').classList.add('hidden');
                document.getElementById('site-subtitle-skeleton').classList.add('hidden');
                const titleEl = document.getElementById('site-title-display');
                const subEl   = document.getElementById('site-subtitle-display');
                titleEl.classList.remove('hidden'); titleEl.innerText = title;
                subEl.classList.remove('hidden');   subEl.innerText   = subtitle;

                const badge = document.getElementById('popular-top-badge');
                if (badge) badge.innerText = `TOP ${globalPopularLimit}`;

                renderCustomNavbarLinks(rawNavLinks);
                renderCategoryFilters();
            } catch (err) {
                console.error("加载配置出错:", err);
                activeCategories = ["技术", "教程", "随笔", "思考"];
                activeSeriesList = ["科学上网", "谷歌系列", "NAS系列"];
                // 兜底：清除骨架
                document.getElementById('site-title-skeleton')?.classList.add('hidden');
                document.getElementById('site-subtitle-skeleton')?.classList.add('hidden');
                const titleEl = document.getElementById('site-title-display');
                titleEl.classList.remove('hidden');
                titleEl.innerText = "dh.at8.ccwu.cc";
                document.getElementById('site-subtitle-display').classList.remove('hidden');
                renderCategoryFilters();
            }
        }

        function renderCustomNavbarLinks(linksArray) {
            const container = document.getElementById('custom-navbar-links');
            if (!container) return;
            container.innerHTML = linksArray.map(item =>
                `<a href="${item.url}" target="_blank"
                    class="hover:text-amber-500 transition-colors">${item.name}</a>`
            ).join('');
        }

        // ── 导航 Meta ─────────────────────────────────────────────────────
        async function fetchNavMeta() {
            try {
                const res = await fetchWithTimeout('./api/posts?get_nav_meta=true&_t=' + Date.now());
                dbNavMeta = await res.json();
                const finalList = Array.from(new Set([...activeSeriesList, ...Object.keys(dbNavMeta)]));
                const navContainer = document.getElementById('series-navbar-container');
                navContainer.innerHTML = finalList.map(series => {
                    const active = currentFilterSeries === series;
                    return `<a href="#/series/${encodeURIComponent(series)}"
                               class="hover:text-amber-500 transition-colors
                                      ${active ? 'text-amber-500 border-b-2 border-amber-500 pb-1' : ''}"
                            >${series}</a>`;
                }).join('');
            } catch (e) {
                console.error("导航Meta出错:", e);
            }
        }

        // ── 分类过滤按钮 ──────────────────────────────────────────────────
        function renderCategoryFilters() {
            const container = document.getElementById('category-filter-container');
            if (!container) return;
            let cats = activeCategories;
            if (currentFilterSeries && dbNavMeta[currentFilterSeries]?.length)
                cats = dbNavMeta[currentFilterSeries];

            const btnBase = "px-4 py-2 rounded-full text-xs font-semibold tracking-wide transition-all";
            const btnOn   = "bg-amber-500 text-white shadow-sm";
            const btnOff  = "bg-white/10 text-slate-300 border border-white/10 hover:bg-white/20";

            container.innerHTML = `
                <button onclick="filterByCategory('')"
                        class="${btnBase} ${!currentFilterCategory ? btnOn : btnOff}">全部</button>
                ${cats.map(cat => `
                <button onclick="filterByCategory('${cat}')"
                        class="${btnBase} ${currentFilterCategory === cat ? btnOn : btnOff}">${cat}</button>
                `).join('')}`;
        }

        async function filterByCategory(cat) {
            currentFilterCategory = cat;
            currentPageNum = 1;
            renderCategoryFilters();
            await fetchPostsAndRender(1);
        }

        async function handleSearch(e) { if (e.key === 'Enter') await triggerSearch(); }
        async function triggerSearch() {
            currentSearchQuery = document.getElementById('search-input').value.trim();
            currentPageNum = 1;
            await fetchPostsAndRender(1);
        }

        // ── 视图切换 ──────────────────────────────────────────────────────
        async function showHomeView() {
            currentFilterSeries = currentFilterCategory = currentSearchQuery = "";
            const si = document.getElementById('search-input');
            if (si) si.value = "";
            await fetchNavMeta();
            renderCategoryFilters();
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            await Promise.all([fetchPostsAndRender(1), fetchPopularPosts()]);
        }

        async function showSeriesView(seriesName) {
            currentFilterSeries   = seriesName;
            currentFilterCategory = currentSearchQuery = "";
            const si = document.getElementById('search-input');
            if (si) si.value = "";
            await fetchNavMeta();
            renderCategoryFilters();
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            await Promise.all([fetchPostsAndRender(1), fetchPopularPosts()]);
        }

        // ── 文章列表 ──────────────────────────────────────────────────────
        async function fetchPostsAndRender(page = 1) {
            currentPageNum = page;
            const container = document.getElementById('posts-list-container');
            if (!container) return;

            // 骨架屏占位（8张卡片）
            container.innerHTML = Array(8).fill(0).map(() => `
                <div class="rounded-2xl border border-white/10 overflow-hidden flex flex-col"
                     style="background:rgba(15,23,42,0.50);">
                    <div class="skeleton aspect-video w-full"></div>
                    <div class="p-5 space-y-2.5">
                        <div class="skeleton h-4 w-4/5 rounded"></div>
                        <div class="skeleton h-3 w-full rounded"></div>
                        <div class="skeleton h-3 w-2/3 rounded"></div>
                    </div>
                    <div class="px-5 pb-5 pt-2 flex justify-between gap-2">
                        <div class="skeleton h-3 w-1/4 rounded"></div>
                        <div class="skeleton h-3 w-1/5 rounded"></div>
                    </div>
                </div>`).join('');

            try {
                let url = `./api/posts?page=${page}&limit=12&_t=${Date.now()}`;
                if (currentFilterCategory) url += `&category=${encodeURIComponent(currentFilterCategory)}`;
                if (currentFilterSeries)   url += `&series=${encodeURIComponent(currentFilterSeries)}`;
                if (currentSearchQuery)    url += `&q=${encodeURIComponent(currentSearchQuery)}`;

                const res   = await fetchWithTimeout(url);
                const data  = await res.json();
                const posts = data.results;
                const total = data.total;
                const limit = data.limit;

                container.innerHTML = '';

                if (!posts.length) {
                    container.innerHTML = '<div class="col-span-full text-slate-400 text-sm py-12 text-center">暂无发布内容。</div>';
                    document.getElementById('pagination-container').innerHTML = '';
                    return;
                }

                posts.forEach((post, idx) => {
                    const cover = post.cover
                        ? `<img src="${post.cover}" loading="lazy"
                               class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 rounded-t-2xl"
                               alt="${post.title}">`
                        : `<div class="w-full h-full bg-gradient-to-tr ${getGradient(idx)}
                               flex items-center justify-center text-white/10 font-bold text-3xl select-none rounded-t-2xl">BLOGS</div>`;
                    const summary = globalLayoutMode !== 'simple'
                        ? `<p class="text-slate-400 text-xs leading-relaxed line-clamp-2">${post.summary}</p>` : '';
                    const titleCls = globalLayoutMode === 'simple'
                        ? "text-sm font-bold text-white line-clamp-3 group-hover:text-amber-400 transition-colors"
                        : "text-sm font-bold text-white line-clamp-1 group-hover:text-amber-400 transition-colors";

                    container.innerHTML += `
                        <div class="post-card group rounded-2xl border border-white/10 shadow-sm
                                    hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300
                                    overflow-hidden flex flex-col justify-between"
                             style="background:rgba(15,23,42,0.52);animation-delay:${idx * 40}ms">
                            <div>
                                <a href="#/post/${post.id}"
                                   class="block aspect-video w-full overflow-hidden relative bg-zinc-900/50 rounded-t-2xl isolate">
                                    ${cover}
                                    <span class="absolute top-3 left-3 bg-zinc-900/80 text-white text-[10px]
                                                 font-bold px-2 py-0.5 rounded backdrop-blur-sm uppercase z-10">
                                        ${post.category || '未分类'}
                                    </span>
                                </a>
                                <div class="p-5 space-y-2">
                                    <h3 class="${titleCls}">
                                        <a href="#/post/${post.id}" title="${post.title}">${post.title}</a>
                                    </h3>
                                    ${summary}
                                </div>
                            </div>
                            <div class="px-5 pb-5 pt-2 border-t border-white/5
                                        flex items-center justify-between text-[10px] text-slate-500">
                                <span>📅 ${post.date}</span>
                                <span>👁️ ${post.views}</span>
                            </div>
                        </div>`;
                });

                renderPagination(total, limit, page);

            } catch (err) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <p class="text-red-400 text-sm mb-3">⚠️ 获取文章失败，可能网络超时</p>
                        <button onclick="fetchPostsAndRender(${page})"
                                class="px-4 py-2 bg-amber-500 hover:bg-amber-400 text-white
                                       text-xs font-bold rounded-lg transition-all">🔄 重新加载</button>
                    </div>`;
            }
        }

        // ── 分页 ─────────────────────────────────────────────────────────
        function renderPagination(total, limit, cur) {
            const container = document.getElementById('pagination-container');
            if (!container) return;
            const pages = Math.ceil(total / limit);
            if (pages <= 1) { container.innerHTML = ''; return; }

            const btnBase = "px-3 py-1.5 text-xs font-semibold bg-white/10 text-slate-200 hover:bg-white/20 rounded transition-all";
            const btnCur  = "px-3 py-1.5 text-xs font-bold bg-amber-500 text-white rounded shadow-sm";
            const btnNav  = "px-3.5 py-1.5 text-xs font-semibold bg-white/10 text-slate-200 hover:bg-white/20 active:scale-95 rounded transition-all";

            let html = '';
            if (cur > 1) html += `<button onclick="fetchPostsAndRender(${cur-1})" class="${btnNav}">« 上一页</button>`;

            const start = Math.max(1, cur-2), end = Math.min(pages, cur+2);
            if (start > 1) {
                html += `<button onclick="fetchPostsAndRender(1)" class="${btnBase}">1</button>`;
                if (start > 2) html += `<span class="px-1 text-slate-500 text-xs">…</span>`;
            }
            for (let i = start; i <= end; i++)
                html += i === cur
                    ? `<span class="${btnCur}">${i}</span>`
                    : `<button onclick="fetchPostsAndRender(${i})" class="${btnBase}">${i}</button>`;
            if (end < pages) {
                if (end < pages-1) html += `<span class="px-1 text-slate-500 text-xs">…</span>`;
                html += `<button onclick="fetchPostsAndRender(${pages})" class="${btnBase}">${pages}</button>`;
            }
            if (cur < pages) html += `<button onclick="fetchPostsAndRender(${cur+1})" class="${btnNav}">下一页 »</button>`;

            container.innerHTML = html;
        }

        // ── 热门文章 ──────────────────────────────────────────────────────
        async function fetchPopularPosts() {
            const container = document.getElementById('popular-posts-container');
            if (!container) return;
            try {
                const res   = await fetchWithTimeout(`./api/posts?popular=${globalPopularLimit}&_t=${Date.now()}`);
                const posts = await res.json();
                if (!posts.length) {
                    container.innerHTML = '<p class="text-slate-500 text-xs">暂无热度统计</p>';
                    return;
                }
                container.innerHTML = posts.map((post, idx) => {
                    const thumb = post.cover
                        ? `<img src="${post.cover}" loading="lazy" class="w-full h-full object-cover rounded-md" alt="">`
                        : `<div class="w-full h-full bg-gradient-to-tr ${getGradient(idx)} rounded-md"></div>`;
                    return `
                        <a href="#/post/${post.id}"
                           class="flex items-center gap-3 p-1.5 hover:bg-white/5 rounded-lg transition-colors group">
                            <div class="w-12 h-12 rounded-md overflow-hidden bg-zinc-800 shrink-0">${thumb}</div>
                            <div class="min-w-0 flex-grow">
                                <h4 class="text-xs font-bold text-slate-200 line-clamp-2 leading-snug
                                           group-hover:text-amber-400 transition-colors">${post.title}</h4>
                                <div class="text-[9px] text-slate-500 mt-1 flex justify-between">
                                    <span>${post.date}</span>
                                    <span class="font-bold text-amber-400">👁️ ${post.views}</span>
                                </div>
                            </div>
                        </a>`;
                }).join('');
            } catch (e) {
                container.innerHTML = '<p class="text-red-400 text-xs">读取排行失败</p>';
            }
        }

        // ── 渐变色工具 ───────────────────────────────────────────────────
        const gradients = [
            "from-indigo-400 to-purple-500", "from-pink-400 to-rose-500",
            "from-cyan-400 to-blue-500",     "from-emerald-400 to-teal-500",
            "from-amber-400 to-orange-500",  "from-violet-400 to-purple-500"
        ];
        function getGradient(i) { return gradients[i % gradients.length]; }

        // ── 文章详情加载 ──────────────────────────────────────────────────
        async function loadPost(postId) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('post-view').classList.remove('hidden');
            const content = document.getElementById('post-content');
            // 文章骨架屏
            content.innerHTML = `
                <div class="space-y-4">
                    <div class="skeleton h-4 rounded" style="width:100%"></div>
                    <div class="skeleton h-4 rounded" style="width:90%"></div>
                    <div class="skeleton h-4 rounded" style="width:95%"></div>
                    <div class="skeleton h-4 rounded" style="width:85%"></div>
                    <div class="skeleton h-4 rounded" style="width:100%"></div>
                    <div class="skeleton h-4 rounded" style="width:70%"></div>
                </div>`;
            try {
                const base = R2_DOMAIN || window.location.origin;
                const res  = await fetchWithTimeout(`${base}/posts/${postId}.md?_t=${Date.now()}`);
                if (!res.ok) throw new Error();
                content.innerHTML = marked.parse(await res.text());

                fetchWithTimeout(`./api/views?id=${postId}`, { method: 'POST' })
                    .then(r => r.json())
                    .then(d => { document.getElementById('post-views-count').innerText = `阅读量: ${d.views}`; })
                    .catch(() => { document.getElementById('post-views-count').innerText = `阅读量: -`; });

                addCopyButtons();
                document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            } catch {
                content.innerHTML = '<p class="text-red-400 text-sm">无法载入文章，请确保 R2 跨域策略已配置。</p>';
            }
        }

        // ── 代码块复制按钮 ────────────────────────────────────────────────
        function addCopyButtons() {
            document.querySelectorAll('pre').forEach(pre => {
                if (pre.parentElement.classList.contains('code-block-wrapper')) return;
                const wrap = document.createElement('div');
                wrap.className = 'code-block-wrapper';
                pre.parentNode.insertBefore(wrap, pre);
                wrap.appendChild(pre);
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = '复制';
                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(pre.querySelector('code').innerText).then(() => {
                        btn.innerText = '已复制';
                        setTimeout(() => btn.innerText = '复制', 2000);
                    });
                });
                wrap.appendChild(btn);
            });
        }
    </script>

</body>
</html>
